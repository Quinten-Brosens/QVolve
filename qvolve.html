<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Qvolve</title>

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Qvolve" />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    :root { --sat: env(safe-area-inset-top,0px); --sab: env(safe-area-inset-bottom,0px); }
  </style>
</head>
<body class="bg-gray-50">
<div id="root"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;"><p style="color:white;font-size:24px;font-weight:900;margin-bottom:8px;">Q<span style="color:#fb923c">volve</span></p><p style="color:#60a5fa;font-size:13px;">Laden...</p></div></div>

<script src="data/nevo-data.js"></script>
<script>
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = '<div style="padding:20px;background:#1e1e2e;color:#f38ba8;font-family:monospace;min-height:100vh"><h2 style="color:white">Fout bij laden</h2><p>' + msg + '</p><p>Regel: ' + line + '</p></div>';
  return false;
};
</script>
<script type="text/babel" data-presets="react,env" src="js/lib.jsx"></script>
<script type="text/babel" data-presets="react,env" src="js/components-auth.jsx"></script>
<script type="text/babel" data-presets="react,env" src="js/components-onboarding.jsx"></script>
<script type="text/babel" data-presets="react,env" src="js/components-voeding.jsx"></script>
<script type="text/babel" data-presets="react,env" src="js/components-schema.jsx"></script>
<script type="text/babel" data-presets="react,env" src="js/app.jsx"></script>

<script>
if ('serviceWorker' in navigator && location.hostname === 'quinten-brosens.github.io') {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/QVolve/sw.js')
      .then(function(reg) { reg.update(); console.log('SW geregistreerd:', reg.scope); })
      .catch(function(err) { console.log('SW fout:', err); });
  });
}
</script>
</body>
</html>
