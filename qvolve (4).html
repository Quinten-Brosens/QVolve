// ─── localStorage helpers ───────────────────────────────────────────────────
function lsGet(key) {
  try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : null; } catch { return null; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function lsDel(key) { try { localStorage.removeItem(key); } catch {} }

// ─── Gemini API ─────────────────────────────────────────────────────────────
async function callGemini(prompt, maxTokens = 1200) {
  const apiKey = lsGet('qvolve-gemini-key');
  if (!apiKey) throw new Error('Geen Gemini API-sleutel. Voeg toe via ⚙️ in de header.');
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: maxTokens }
      })
    }
  );
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates[0].content.parts[0].text;
}

async function estimateFoodWithAI(description) {
  const text = await callGemini(
    `Schat de voedingswaarden van: "${description}". Geef ALLEEN een JSON object terug, niets anders, geen markdown: {"name":"...","kcal":number,"protein":number,"fat":number,"carbs":number,"portionDescription":"..."}`
  );
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

async function suggestMealWithAI(targets, mealLabel) {
  const parts = [];
  if (targets.kcal) parts.push(`${Math.round(targets.kcal)} kcal`);
  if (targets.protein) parts.push(`${Math.round(targets.protein)}g eiwit`);
  if (targets.fat) parts.push(`${Math.round(targets.fat)}g vet`);
  if (targets.carbs) parts.push(`${Math.round(targets.carbs)}g koolhydraten`);
  const text = await callGemini(
    `Stel een Belgische/Nederlandse maaltijd voor als ${mealLabel.toLowerCase()}, die voldoet aan: ${parts.join(', ')}. Geef ALLEEN JSON: {"title":"...","description":"...","kcal":number,"protein":number,"fat":number,"carbs":number}`
  );
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

  other:     { label: "Andere sporter (kracht, fitness, team, ...)", proteinPerKg: 1.8 },
};
const MACRO_PROFILES = {
  normal:      { label: "Normaal (op basis van type sporter)", type: "fitchef" },
  highProtein: { label: "High protein (41% eiwit / 22% vet / 37% KH)", type: "percent", protein: 0.41, fat: 0.22, carbs: 0.37 },
  keto:        { label: "Keto (70% vet / 20% eiwit)", type: "percent", fat: 0.7, protein: 0.2 },
};
const MEAL_TIMES = [
  { key: "ontbijt",     label: "Ontbijt" },
  { key: "snack_vm",    label: "Snack voormiddag" },
  { key: "lunch",       label: "Lunch" },
  { key: "snack_nm",    label: "Snack namiddag" },
  { key: "diner",       label: "Diner" },
  { key: "snack_avond", label: "Snack avond" },
];

function slugifyName(name) {
  return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'gebruiker';
}
function calcBMR({ weight, height, age, gender }) {
  return gender === 'man'
    ? 66.5 + 13.75*weight + 5.003*height - 6.755*age
    : 655.0 + 9.563*weight + 1.85*height - 4.676*age;
}
function calcMacros(profile) {
  const bmr = calcBMR(profile);
  const activity = ACTIVITY_FACTORS[profile.activity] || ACTIVITY_FACTORS.moderate;
  const tdee = bmr * activity.factor;
  const goal = GOALS[profile.goal] || GOALS.maintain;
  const targetKcal = Math.round(tdee * (1 + goal.kcalAdjustPct));
  const mp = MACRO_PROFILES[profile.macroProfile] || MACRO_PROFILES.normal;
  let proteinG, fatG, carbsG;
  if (mp.type === 'fitchef') {
    const sp = SPORTER_TYPES[profile.sporterType] || SPORTER_TYPES.other;
    proteinG = Math.round(profile.weight * sp.proteinPerKg);
    fatG = Math.round(profile.weight * 1);
    carbsG = Math.round(Math.max(targetKcal - proteinG*4 - fatG*9, 0) / 4);
  } else {
    proteinG = Math.round((targetKcal * (mp.protein||0)) / 4);
    fatG = Math.round((targetKcal * (mp.fat||0)) / 9);
    if (mp.carbs != null) {
      carbsG = Math.round((targetKcal * mp.carbs) / 4);
    } else {
      carbsG = Math.round(Math.max(targetKcal - proteinG*4 - fatG*9, 0) / 4);
    }
  }
  const ratios = { protein: (proteinG*4)/targetKcal, fat: (fatG*9)/targetKcal, carbs: (carbsG*4)/targetKcal };
  return { targetKcal, proteinG, fatG, carbsG, bmr: Math.round(bmr), tdee: Math.round(tdee), ratios };
}
function applyKcalToMacros(macros, newKcal) {
  const r = macros.ratios || { protein:(macros.proteinG*4)/macros.targetKcal, fat:(macros.fatG*9)/macros.targetKcal, carbs:(macros.carbsG*4)/macros.targetKcal };
  const targetKcal = Math.max(Math.round(newKcal),0);
  const proteinG = Math.round((targetKcal*r.protein)/4);
  const fatG = Math.round((targetKcal*r.fat)/9);
  const carbsG = Math.round(Math.max(targetKcal-proteinG*4-fatG*9,0)/4);
  return { ...macros, targetKcal, proteinG, fatG, carbsG, ratios: r };
}
function toDateStr(d) { return d.toISOString().slice(0,10); }
function addDays(dateStr, n) { const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return toDateStr(d); }
function formatDateNice(dateStr) { return new Date(dateStr+'T00:00:00').toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'}); }
function groupByMeal(log) {
  const map = {}; for(const m of MEAL_TIMES) map[m.key]=[];
  for(const e of log) { const k=MEAL_TIMES.some(m=>m.key===e.mealTime)?e.mealTime:MEAL_TIMES[0].key; map[k].push(e); }
  return map;
}

function AdminPanel({ onClose }) {
  const [users, setUsers] = useState(loadUsers());

  const [msg, setMsg] = useState('');

  function handleAdd() {
    if (!newName.trim()) return;
    if (users.find(u => u.name.toLowerCase() === newName.trim().toLowerCase())) { setMsg('Gebruiker bestaat al.'); return; }
    const updated = [...users, { name: newName.trim(), password: DEFAULT_PASSWORD, mustChangePw: true }];
    saveUsers(updated); setUsers(updated); setNewName(''); setMsg(`✓ ${newName.trim()} toegevoegd`);
  }
  function handleReset(name) {
    const updated = users.map(u => u.name===name ? {...u, password:DEFAULT_PASSWORD, mustChangePw:true} : u);
    saveUsers(updated); setUsers(updated); setMsg(`✓ Wachtwoord van ${name} gereset`);
  }
  function handleDelete(name) {
    if (!window.confirm(`${name} verwijderen?`)) return;
    const updated = users.filter(u => u.name!==name);
    saveUsers(updated); setUsers(updated); setMsg(`✓ ${name} verwijderd`);

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-end sm:items-center justify-center p-4">

// ─── Wachtwoord wijzigen ──────────────────────────────────────────────────────
function ChangePwScreen({ userName, onDone }) {
  const [pw1,setPw1]=useState(''); const [pw2,setPw2]=useState('');

    if (pw1.length<8) { setErr('Minimaal 8 tekens.'); return; }
    if (pw1!==pw2) { setErr('Wachtwoorden komen niet overeen.'); return; }
    if (pw1===DEFAULT_PASSWORD) { setErr('Kies een ander wachtwoord dan het standaard.'); return; }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center bg-blue-950 px-6">

              className="w-full bg-blue-800 border border-blue-700 rounded-xl text-white placeholder-blue-500 px-4 py-3 pr-16 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500" />

          {err && <p className="text-xs text-red-400 bg-red-950/50 rounded-lg px-3 py-2">{err}</p>}

            className="w-full bg-orange-500 hover:bg-orange-400 disabled:opacity-50 text-white rounded-xl py-3 text-sm font-semibold transition-colors flex items-center justify-center gap-2">
            {saving && <Icon name="Loader2" size={14}/>}

        </div>
      </div>
    </div>
  );
}

function AccessGate({ onUnlock }) {
  const [users] = useState(loadUsers());

  const [password, setPassword] = useState('');
  const [showPw, setShowPw] = useState(false);

  const [adminErr, setAdminErr] = useState('');
  const [adminOpen, setAdminOpen] = useState(false);
  const [changePw, setChangePw] = useState(null);

  function handleLogin() {
    const u = loadUsers().find(u => u.name===selName && u.password===password.trim());
    if (!u) { setError('Foutieve naam of wachtwoord.'); return; }
    if (u.mustChangePw) { setChangePw(u.name); return; }
    onUnlock(u.name);
  }
  function handleAdminLogin() {
    if (adminPw===ADMIN_PASSWORD) { setAdminOpen(true); setShowAdmin(false); setAdminPw(''); setAdminErr(''); }

  }

  if (changePw) return <ChangePwScreen userName={changePw} onDone={() => { setChangePw(null); onUnlock(changePw); }} />;

  return (
    <>
      {adminOpen && <AdminPanel onClose={() => setAdminOpen(false)} />}
      <div className="min-h-screen flex flex-col items-center justify-center bg-blue-950 px-6">
        <div className="mb-8 text-center">

            <Icon name="Lock" size={14} className="text-orange-400" />

          </div>
          <div className="space-y-3">
            <div>
              <label className="block text-xs font-medium text-blue-400 mb-1">Naam</label>
              <select value={selName} onChange={e=>{setSelName(e.target.value);setError('');}}
                className="w-full bg-blue-800 border border-blue-700 rounded-xl text-sm px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500 appearance-none text-white"
                style={{colorScheme:'dark'}}>
                <option value="">— Selecteer je naam —</option>
                {users.map(u => <option key={u.name} value={u.name}>{u.name}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-medium text-blue-400 mb-1">Wachtwoord</label>
              <div className="relative">
                <input type={showPw?'text':'password'} value={password} onChange={e=>{setPassword(e.target.value);setError('');}}
                  onKeyDown={e=>e.key==='Enter'&&handleLogin()} placeholder="••••••••••"
                  className="w-full rounded-xl bg-blue-800 border border-blue-700 text-white placeholder-blue-500 px-4 py-3 pr-14 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500" />
                <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-blue-400 text-[11px]">{showPw?'verberg':'toon'}</button>
              </div>
            </div>
            {error && <p className="text-xs text-red-400 bg-red-950/50 rounded-lg px-3 py-2">{error}</p>}
            <button onClick={handleLogin} disabled={!selName||!password}
              className="w-full bg-orange-500 hover:bg-orange-400 disabled:opacity-40 text-white rounded-xl py-3 text-sm font-semibold transition-colors">
              Start →
            </button>
          </div>
        </div>
        <button onClick={()=>setShowAdmin(!showAdmin)} className="mt-6 text-[11px] text-blue-700 hover:text-blue-500">Beheer</button>

        <span className={`text-xs ${over?'text-red-600 font-semibold':'text-gray-500'}`}>{Math.round(consumed)} / {Math.round(target)} {unit}</span>
      </div>
      <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
        <div className={`h-full rounded-full transition-all ${over?'bg-red-400':color}`} style={{width:`${pct}%`}} />
      </div>
    </div>
  );
}

function KcalAdjuster({targetKcal,onAdjust,onReset}){
  const [value,setValue]=useState(String(targetKcal));
  useEffect(()=>setValue(String(targetKcal)),[targetKcal]);
  function commit(v){const n=parseFloat(v);if(!isNaN(n)&&n>0)onAdjust(n);else setValue(String(targetKcal));}
  return (
    <div className="flex items-center gap-2">
      <button onClick={()=>commit(targetKcal-50)} className="w-6 h-6 rounded-full bg-white border border-gray-200 text-gray-500 hover:bg-gray-100 text-sm leading-none">−</button>
      <input type="number" value={value} onChange={e=>setValue(e.target.value)} onBlur={()=>commit(value)} onKeyDown={e=>e.key==='Enter'&&commit(value)}
        className="w-20 text-center text-sm font-semibold border border-gray-200 rounded-md py-1 bg-white" />
      <span className="text-xs text-gray-400">kcal</span>
      <button onClick={()=>commit(targetKcal+50)} className="w-6 h-6 rounded-full bg-white border border-gray-200 text-gray-500 hover:bg-gray-100 text-sm leading-none">+</button>
      <button onClick={onReset} className="text-[11px] text-gray-400 hover:text-gray-600 underline ml-1">Herstel</button>
    </div>
  );
}

// ─── AddFoodPanel ────────────────────────────────────────────────────────────
function AddFoodPanel({pool,onAdd,onSaveCustom}){
  const [query,setQuery]=useState('');
  const [staged,setStaged]=useState([]);
  const [mode,setMode]=useState('search');
  const [description,setDescription]=useState('');
  const [aiResult,setAiResult]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [aiError,setAiError]=useState('');
  const emptyManual={name:'',kcal:'',protein:'',carbs:'',fat:''};
  const [manual,setManual]=useState(emptyManual);
  const [manualError,setManualError]=useState('');
  const [manualSaved,setManualSaved]=useState(false);

  const results=useMemo(()=>{
    if(!query.trim())return[];
    const q=query.toLowerCase();
    return pool.filter(f=>f.name.toLowerCase().includes(q)).sort((a,b)=>a.name.toLowerCase().indexOf(q)-b.name.toLowerCase().indexOf(q)).slice(0,12);
  },[pool,query]);

  function addToStaged(item){setStaged(s=>[...s,{...item,stagedId:`s-${Date.now()}-${Math.random().toString(36).slice(2)}`,grams:item.perGram?100:null}]);setQuery('');}
  function updateGrams(id,g){setStaged(s=>s.map(it=>it.stagedId===id?{...it,grams:g}:it));}
  function removeStaged(id){setStaged(s=>s.filter(it=>it.stagedId!==id));}

  function confirmAll(){
    const entries=staged.map(item=>{
      if(item.perGram){const g=parseFloat(item.grams)||0;return{id:`log-${Date.now()}-${Math.random()}`,name:item.name,grams:g,kcal:(item.kcal*g)/100,protein:(item.protein*g)/100,fat:(item.fat*g)/100,carbs:(item.carbs*g)/100,source:'nevo'};}
      return{id:`log-${Date.now()}-${Math.random()}`,name:item.name,grams:null,kcal:item.kcal,protein:item.protein,fat:item.fat,carbs:item.carbs,source:'custom',portionDescription:item.portionDescription};
    });
    onAdd(entries);setStaged([]);
  }

  function handleManualSave(addToLog){
    setManualError('');
    if(!manual.name.trim()){setManualError('Vul een naam in.');return;}
    const kcal=parseFloat(manual.kcal),protein=parseFloat(manual.protein),carbs=parseFloat(manual.carbs),fat=parseFloat(manual.fat);
    if([kcal,protein,carbs,fat].some(isNaN)){setManualError('Vul alle waarden in als getal.');return;}
    const food={id:`custom-${Date.now()}`,name:manual.name.trim(),kcal,protein,carbs,fat,fiber:0,perGram:true,group:'Eigen voedingsmiddelen'};
    onSaveCustom(food);
    if(addToLog){addToStaged(food);setMode('search');}
    setManualSaved(true);setManual(emptyManual);
    setTimeout(()=>setManualSaved(false),3000);
  }

  async function handleAiEstimate(){
    if(!description.trim())return;
    setAiLoading(true);setAiError('');setAiResult(null);
    try{setAiResult(await estimateFoodWithAI(description));}
    catch(e){setAiError(e.message||'Kon geen schatting maken.');}
    setAiLoading(false);
  }

  function addAiResult(alsoSave){
    onAdd([{id:`log-${Date.now()}-${Math.random()}`,name:aiResult.name,grams:null,kcal:aiResult.kcal,protein:aiResult.protein,fat:aiResult.fat,carbs:aiResult.carbs,source:'ai',portionDescription:aiResult.portionDescription}]);
    if(alsoSave)onSaveCustom({id:`custom-${Date.now()}`,name:aiResult.name,kcal:aiResult.kcal,protein:aiResult.protein,fat:aiResult.fat,carbs:aiResult.carbs,perGram:false,portionDescription:aiResult.portionDescription});
    setAiResult(null);setDescription('');
  }

  return (
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <div className="flex gap-1 mb-4 bg-gray-100 rounded-lg p-1">
        {[{id:'search',label:'Zoeken'},{id:'manual',label:'Zelf ingeven'},{id:'describe',label:'AI-schatting'}].map(t=>(
          <button key={t.id} onClick={()=>setMode(t.id)} className={`flex-1 py-1 rounded-md text-xs font-medium transition-colors ${mode===t.id?'bg-white shadow-sm text-gray-900':'text-gray-500'}`}>{t.label}</button>
        ))}
      </div>

      {mode==='search'&&(
        <div>
          <div className="relative mb-3">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[15px]"><Icon name="Search" size={15}/></span>
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Zoek voedingsmiddel..." className="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
          </div>
          {results.length>0&&(
            <div className="border border-gray-100 rounded-lg divide-y divide-gray-50 max-h-56 overflow-y-auto mb-3">
              {results.map(item=>(
                <button key={item.id} onClick={()=>addToStaged(item)} className="w-full text-left px-3 py-2 hover:bg-gray-50 text-sm flex justify-between items-center">
                  <span className="text-gray-800">{item.name}</span>
                  <span className="text-xs text-gray-400 flex items-center gap-1">{Math.round(item.kcal)} kcal{item.perGram?'/100g':''} <Icon name="Plus" size={12}/></span>
                </button>
              ))}
            </div>
          )}
          {staged.length>0&&(
            <div className="space-y-2">
              <p className="text-xs font-medium text-gray-600">Geselecteerd — vul grammen in:</p>
              {staged.map(item=>(
                <div key={item.stagedId} className="border border-gray-100 rounded-lg p-2.5 flex items-center gap-2">
                  <span className="text-sm text-gray-800 flex-1 truncate">{item.name}</span>
                  {item.perGram?(<><input type="number" inputMode="decimal" value={item.grams} onChange={e=>updateGrams(item.stagedId,e.target.value)} className="w-16 rounded-lg border border-gray-200 px-2 py-1 text-sm text-center" /><span className="text-xs text-gray-400">g</span></>):
                  <span className="text-xs text-gray-400">vaste portie</span>}
                  <button onClick={()=>removeStaged(item.stagedId)} className="text-gray-300 hover:text-red-500"><Icon name="X" size={14}/></button>
                </div>
              ))}
              <button onClick={confirmAll} className="w-full bg-orange-500 hover:bg-orange-600 text-white rounded-lg py-1.5 text-xs font-medium flex items-center justify-center gap-1 mt-2">
                <Icon name="Plus" size={13}/> Toevoegen ({staged.length})
              </button>
            </div>
          )}
        </div>
      )}

      {mode==='manual'&&(
        <div className="space-y-3">
          <p className="text-xs text-gray-500">Voedingswaarden <strong>per 100g</strong>. Wordt opgeslagen in je persoonlijke lijst.</p>
          <div>
            <label className="text-xs font-medium text-gray-600 block mb-1">Naam product</label>
            <input value={manual.name} onChange={e=>{setManual(m=>({...m,name:e.target.value}));setManualError('');setManualSaved(false);}}
              placeholder="Bv. Proteïnereep XYZ" className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400" />
          </div>
          <div className="grid grid-cols-2 gap-2">
            {[{key:'kcal',label:'Calorieën',unit:'kcal',color:'text-orange-500'},{key:'protein',label:'Eiwitten',unit:'g',color:'text-blue-600'},{key:'carbs',label:'Koolhydraten',unit:'g',color:'text-purple-600'},{key:'fat',label:'Vetten',unit:'g',color:'text-amber-600'}].map(({key,label,unit,color})=>(
              <div key={key} className="bg-gray-50 rounded-xl p-3">
                <label className={`text-[11px] font-semibold ${color} block mb-1`}>{label}</label>
                <div className="flex items-center gap-1">
                  <input type="number" inputMode="decimal" min="0" value={manual[key]} onChange={e=>{setManual(m=>({...m,[key]:e.target.value}));setManualError('');setManualSaved(false);}} placeholder="0"
                    className="w-full bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center focus:outline-none focus:ring-2 focus:ring-orange-400" />
                  <span className="text-xs text-gray-400 flex-shrink-0">{unit}</span>
                </div>
              </div>
            ))}
          </div>
          {manualError&&<p className="text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2">{manualError}</p>}
          {manualSaved&&<p className="text-xs text-orange-500 bg-orange-50 rounded-lg px-3 py-2">✓ Opgeslagen!</p>}
          <div className="flex gap-2">
            <button onClick={()=>handleManualSave(false)} className="flex-1 border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-xl py-2.5 text-sm font-medium">Alleen opslaan</button>
            <button onClick={()=>handleManualSave(true)} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white rounded-xl py-2.5 text-sm font-medium flex items-center justify-center gap-1.5">
              <Icon name="Plus" size={14}/> Opslaan & toevoegen
            </button>
          </div>
        </div>
      )}

      {mode==='describe'&&(
        <div>
          <textarea value={description} onChange={e=>setDescription(e.target.value)} placeholder="Bv. 150g kipfilet met rijst en broccoli" rows={2}
            className="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 mb-2 resize-none" />
          {!lsGet('qvolve-gemini-key')&&<p className="text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2 mb-2">⚠️ Stel eerst een Gemini API-sleutel in via ⚙️ in de header.</p>}
          <button onClick={handleAiEstimate} disabled={aiLoading||!description.trim()||!lsGet('qvolve-gemini-key')}
            className="bg-blue-900 hover:bg-blue-800 disabled:bg-gray-300 text-white rounded-lg px-3 py-1.5 text-xs font-medium flex items-center gap-1.5">
            {aiLoading?<Icon name="Loader2" size={13}/>:<Icon name="Sparkles" size={13}/>}{aiLoading?'Schatten...':'Schat macro\'s'}
          </button>
          {aiError&&<p className="text-xs text-red-600 mt-2">{aiError}</p>}
          {aiResult&&(
            <div className="mt-3 border border-orange-100 bg-orange-50 rounded-lg p-3">
              <p className="text-sm font-medium text-gray-800 mb-1">{aiResult.name}</p>
              <p className="text-xs text-gray-500 mb-2">{aiResult.portionDescription}</p>
              <p className="text-xs text-gray-600 mb-3">{Math.round(aiResult.kcal)} kcal · {Math.round(aiResult.protein)}g eiwit · {Math.round(aiResult.fat)}g vet · {Math.round(aiResult.carbs)}g KH</p>
              <div className="flex gap-2">
                <button onClick={()=>addAiResult(false)} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white rounded-lg py-1.5 text-xs font-medium">Toevoegen</button>
                <button onClick={()=>addAiResult(true)} className="flex-1 border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-lg py-1.5 text-xs font-medium">+ Opslaan</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Maaltijdsuggestie ────────────────────────────────────────────────────────
function MealSuggestionPanel({remaining,onAdd}){
  const [mealTime,setMealTime]=useState(MEAL_TIMES[0].key);
  const [kcal,setKcal]=useState(String(Math.round(remaining.kcal)));
  const [protein,setProtein]=useState(String(Math.round(remaining.protein)));
  const [fat,setFat]=useState(String(Math.round(remaining.fat)));
  const [carbs,setCarbs]=useState(String(Math.round(remaining.carbs)));
  const [loading,setLoading]=useState(false);
  const [suggestion,setSuggestion]=useState(null);
  const [error,setError]=useState('');

  async function handleSuggest(){
    const targets={};
    if(kcal.trim())targets.kcal=parseFloat(kcal);
    if(protein.trim())targets.protein=parseFloat(protein);
    if(fat.trim())targets.fat=parseFloat(fat);
    if(carbs.trim())targets.carbs=parseFloat(carbs);
    if(Object.keys(targets).length===0){setError('Vul minstens één doelwaarde in.');return;}
    setLoading(true);setError('');setSuggestion(null);
    try{const lbl=MEAL_TIMES.find(m=>m.key===mealTime)?.label||'maaltijd';setSuggestion(await suggestMealWithAI(targets,lbl));}
    catch(e){setError(e.message||'Kon geen suggestie maken.');}
    setLoading(false);
  }

  function addSuggestion(){
    onAdd([{id:`log-${Date.now()}-${Math.random()}`,name:suggestion.title,grams:null,kcal:suggestion.kcal,protein:suggestion.protein,fat:suggestion.fat,carbs:suggestion.carbs,source:'ai',portionDescription:suggestion.description}],mealTime);
    setSuggestion(null);
  }

  return (
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <h2 className="text-sm font-semibold text-gray-900 mb-3">Stel een maaltijd voor</h2>
      <div className="mb-3">
        <label className="block text-xs font-medium text-gray-600 mb-1">Eetmoment</label>
        <select value={mealTime} onChange={e=>setMealTime(e.target.value)} className="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400">
          {MEAL_TIMES.map(m=><option key={m.key} value={m.key}>{m.label}</option>)}
        </select>
      </div>
      <div className="grid grid-cols-4 gap-2 mb-2">
        {[['Kcal',kcal,setKcal],['Eiwit',protein,setProtein],['Vet',fat,setFat],['KH',carbs,setCarbs]].map(([l,v,s])=>(
          <div key={l}><label className="block text-xs font-medium text-gray-600 mb-1">{l}</label>
            <input type="number" inputMode="decimal" value={v} onChange={e=>s(e.target.value)} className="w-full rounded-lg border border-gray-200 px-2 py-1.5 text-sm text-center" placeholder="-" /></div>
        ))}
      </div>
      {!lsGet('qvolve-gemini-key')&&<p className="text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2 mb-2">⚠️ Stel eerst een Gemini API-sleutel in.</p>}
      <button onClick={handleSuggest} disabled={loading||!lsGet('qvolve-gemini-key')}
        className="flex items-center gap-1.5 bg-blue-900 hover:bg-blue-800 disabled:bg-gray-300 text-white rounded-lg px-3 py-1.5 text-xs font-medium">
        {loading?<Icon name="Loader2" size={13}/>:<Icon name="Sparkles" size={13}/>}{loading?'Bezig...':'Genereer suggestie'}
      </button>
      {error&&<p className="text-xs text-red-600 mt-2">{error}</p>}
      {suggestion&&(
        <div className="border border-orange-100 bg-orange-50 rounded-lg p-3 mt-3">
          <p className="text-sm font-medium text-gray-800 mb-1">{suggestion.title}</p>
          <p className="text-xs text-gray-500 mb-2">{suggestion.description}</p>
          <p className="text-xs text-gray-600 mb-3">{Math.round(suggestion.kcal)} kcal · {Math.round(suggestion.protein)}g eiwit · {Math.round(suggestion.fat)}g vet · {Math.round(suggestion.carbs)}g KH</p>
          <button onClick={addSuggestion} className="w-full bg-orange-500 hover:bg-orange-600 text-white rounded-lg py-1.5 text-xs font-medium">
            Toevoegen aan {MEAL_TIMES.find(m=>m.key===mealTime)?.label.toLowerCase()||'logboek'}
          </button>
        </div>
      )}
    </div>
  );
}

## Voorkeuren
Budget: ${prefs.budget||'gemiddeld'} · Kooktijd: ${prefs.kooktijd||'normaal'} · Kookdagen: ${prefs.kookdagen||'4-5'}
Eetstijl: ${(prefs.eetstijl||[]).join(', ')||'gemengd'} · Dieet: ${(prefs.dieet||[]).join(', ')||'geen'}
Niet: ${prefs.niet_lust||'niets specifieks'} · Favorieten: ${prefs.favorieten||'geen'} 
Ontbijt: ${(prefs.ontbijt_type||[]).join(', ')||'vrij'} · Snacks: ${(prefs.snacks||[]).join(', ')||'vrij'}
Meal prep: ${prefs.meal_prep||'deels'} · Extra: ${prefs.extra||'geen'}

## Instructies
- 7 dagen, 6 maaltijden per dag: ontbijt, snack voormiddag, lunch, snack namiddag, diner, snack avond
- Ingrediënten met exacte hoeveelheden (bv. "150g kipfilet", "200ml melk")
- Dagelijkse totalen dicht bij macro-doelen (max ±5%)
- ALLEEN JSON terug, geen markdown

{"days":[{"day":"Maandag","meals":[{"mealTime":"ontbijt","name":"...","ingredients":["80g havermout","200ml melk"],"tip":"...","kcal":0,"protein":0,"fat":0,"carbs":0}],"totals":{"kcal":0,"protein":0,"fat":0,"carbs":0}}],"shoppingList":[{"category":"Vlees & vis","items":["..."]}]}`;
}

function VragenlijstStap({vraag,waarde,onChange}){
  if(vraag.type==='single')return(
    <div className="space-y-2">
      {vraag.options.map(opt=>(
        <button key={opt.value} onClick={()=>onChange(opt.value)}
          className={`w-full text-left px-4 py-3 rounded-xl border text-sm transition-colors ${waarde===opt.value?'border-orange-500 bg-orange-50 text-orange-700 font-medium':'border-gray-200 bg-white text-gray-700 hover:border-orange-300'}`}>
          {waarde===opt.value?<Icon name="CheckCircle2" size={14} className="inline mr-2 text-orange-500"/>:<Icon name="Circle" size={14} className="inline mr-2 text-gray-300"/>}{opt.label}
        </button>
      ))}
    </div>
  );
  if(vraag.type==='multi'){
    const sel=Array.isArray(waarde)?waarde:[];
    return(
      <div className="space-y-2">
        {vraag.options.map(opt=>{
          const isSel=sel.includes(opt.value);
          return(
            <button key={opt.value} onClick={()=>onChange(isSel?sel.filter(v=>v!==opt.value):[...sel,opt.value])}
              className={`w-full text-left px-4 py-3 rounded-xl border text-sm transition-colors ${isSel?'border-orange-500 bg-orange-50 text-orange-700 font-medium':'border-gray-200 bg-white text-gray-700 hover:border-orange-300'}`}>
              {isSel?<Icon name="CheckCircle2" size={14} className="inline mr-2 text-orange-500"/>:<Icon name="Circle" size={14} className="inline mr-2 text-gray-300"/>}{opt.label}
            </button>
          );
        })}
      </div>
    );
  }
  return <textarea value={waarde||''} onChange={e=>onChange(e.target.value)} placeholder={vraag.placeholder} rows={3}
    className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none" />;
}

function WeekSchemaPanel({macros,userSlug,onLoadDayToLog,onGoToVoeding}){
  const [fase,setFase]=useState('loading');
  const [stapIndex,setStapIndex]=useState(0);
  const [antwoorden,setAntwoorden]=useState({});
  const [plan,setPlan]=useState(null);
  const [generating,setGenerating]=useState(false);
  const [genError,setGenError]=useState('');
  const [selectedDay,setSelectedDay]=useState(0);
  const [showShopping,setShowShopping]=useState(false);
  const [loadedDays,setLoadedDays]=useState(new Set());

  function getDagDatum(i){
    const base=new Date();const d=base.getDay();base.setDate(base.getDate()-(d===0?6:d-1));base.setDate(base.getDate()+i);return base.toISOString().slice(0,10);
  }

  useEffect(()=>{
    const prefs=lsGet(`weekschema-prefs:${userSlug}`);
    const savedPlan=lsGet(`weekschema-plan:${userSlug}`);
    if(prefs)setAntwoorden(prefs);
    if(savedPlan){setPlan(savedPlan);setFase('plan');}
    else setFase('vragenlijst');
  },[userSlug]);

  async function genereerSchema(prefs){
    setGenerating(true);setGenError('');setFase('generating');
    try{
      const text=await callGemini(buildSchemaPrompt(macros,prefs),8192);
      const clean=text.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      if(!parsed.days||!Array.isArray(parsed.days))throw new Error('Ongeldig schema-formaat.');
      setPlan(parsed);setFase('plan');lsSet(`weekschema-plan:${userSlug}`,parsed);
    }catch(e){setGenError(e.message||'Fout bij genereren.');setFase('vragenlijst');setStapIndex(VRAGENLIJST.length-1);}
    setGenerating(false);
  }

  function handleAntwoord(val){setAntwoorden(p=>({...p,[VRAGENLIJST[stapIndex].id]:val}));}
  function handleVolgende(){
    if(stapIndex<VRAGENLIJST.length-1)setStapIndex(i=>i+1);
    else{lsSet(`weekschema-prefs:${userSlug}`,antwoorden);genereerSchema(antwoorden);}
  }

  const isGeldig=()=>{const v=VRAGENLIJST[stapIndex];const a=antwoorden[v.id];if(v.type==='single')return!!a;if(v.type==='multi')return Array.isArray(a)&&a.length>0;return true;};

  if(fase==='generating')return(
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 text-center">
      <div className="flex justify-center mb-4"><Icon name="ChefHat" size={36} className="text-orange-500"/></div>
      <h2 className="text-sm font-semibold text-gray-900 mb-1">Schema wordt gegenereerd…</h2>
      <p className="text-xs text-gray-500">De AI stelt jouw weekmenu samen. Even geduld (±20 sec).</p>
    </div>
  );

  if(fase==='vragenlijst'||fase==='loading'){
    const vraag=VRAGENLIJST[stapIndex];
    const progress=((stapIndex+1)/VRAGENLIJST.length)*100;
    return(
      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2"><Icon name="Calendar" size={16} className="text-orange-500"/><span className="text-sm font-semibold text-gray-900">Weekschema samenstellen</span></div>
          <span className="text-xs text-gray-400">{stapIndex+1} / {VRAGENLIJST.length}</span>
        </div>
        <div className="h-1.5 bg-gray-100 rounded-full mb-5 overflow-hidden"><div className="h-full bg-orange-500 rounded-full transition-all" style={{width:`${progress}%`}}/></div>
        <p className="text-sm font-medium text-gray-800 mb-4">{vraag.label}</p>
        <VragenlijstStap vraag={vraag} waarde={antwoorden[vraag.id]} onChange={handleAntwoord}/>
        {genError&&<p className="mt-3 text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2">{genError}</p>}
        {!lsGet('qvolve-gemini-key')&&stapIndex===VRAGENLIJST.length-1&&<p className="mt-3 text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2">⚠️ Stel eerst een Gemini API-sleutel in via ⚙️ in de header.</p>}
        <div className="flex gap-2 mt-5">
          {stapIndex>0&&<button onClick={()=>setStapIndex(i=>i-1)} className="flex-1 border border-gray-200 text-gray-600 rounded-lg py-2.5 text-sm font-medium hover:bg-gray-50">← Vorige</button>}
          <button onClick={handleVolgende} disabled={(!isGeldig()&&vraag.type!=='text')||(stapIndex===VRAGENLIJST.length-1&&!lsGet('qvolve-gemini-key'))}
            className={`flex-1 rounded-lg py-2.5 text-sm font-medium transition-colors ${(isGeldig()||vraag.type==='text')&&(stapIndex<VRAGENLIJST.length-1||lsGet('qvolve-gemini-key'))?'bg-orange-500 hover:bg-orange-600 text-white':'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
            {stapIndex<VRAGENLIJST.length-1?'Volgende →':'✨ Genereer weekschema'}
          </button>
        </div>
      </div>
    );
  }

  if(fase==='plan'&&plan){
    const dag=plan.days[selectedDay];
    return(
      <div className="space-y-4">
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2"><Icon name="Calendar" size={16} className="text-orange-500"/><span className="text-sm font-semibold text-gray-900">Jouw weekschema</span></div>
            <div className="flex gap-2">
              <button onClick={()=>setShowShopping(!showShopping)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors ${showShopping?'bg-orange-50 border-orange-300 text-orange-600':'border-gray-200 text-gray-600'}`}>🛒 Boodschappen</button>
              <button onClick={()=>{setPlan(null);lsDel(`weekschema-plan:${userSlug}`);setFase('vragenlijst');setStapIndex(0);}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 text-gray-600"><Icon name="RefreshCw" size={12}/> Opnieuw</button>
            </div>
          </div>
          <div className="flex gap-1 overflow-x-auto pb-1">
            {plan.days.map((d,i)=>(
              <button key={i} onClick={()=>{setSelectedDay(i);setShowShopping(false);}}
                className={`flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${selectedDay===i&&!showShopping?'bg-orange-500 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                {d.day||`Dag ${i+1}`}
              </button>
            ))}
          </div>
        </div>

        {showShopping&&plan.shoppingList&&(
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <h3 className="text-sm font-semibold text-gray-900 mb-3">🛒 Boodschappenlijst</h3>
            {plan.shoppingList.map((cat,i)=>(
              <div key={i} className="mb-3">
                <p className="text-xs font-semibold text-gray-600 mb-1">{cat.category}</p>
                <ul className="text-xs text-gray-600 space-y-0.5">{(cat.items||[]).map((it,j)=><li key={j} className="flex gap-1"><span>•</span><span>{it}</span></li>)}</ul>
              </div>
            ))}
          </div>
        )}

        {!showShopping&&dag&&(
          <div className="space-y-3">
            <div className="flex items-center justify-between">
              <h3 className="text-sm font-semibold text-gray-900">{dag.day}</h3>
              {!loadedDays.has(selectedDay)&&(
                <button onClick={()=>{onLoadDayToLog(dag,getDagDatum(selectedDay));setLoadedDays(s=>new Set([...s,selectedDay]));onGoToVoeding();}}
                  className="text-xs text-white bg-orange-500 hover:bg-orange-600 px-3 py-1.5 rounded-lg font-medium transition-colors">
                  📥 Laden in logboek
                </button>
              )}
              {loadedDays.has(selectedDay)&&<span className="text-xs text-green-600 bg-green-50 px-3 py-1.5 rounded-lg">✓ Geladen</span>}
            </div>
            {(dag.meals||[]).map((meal,i)=>(
              <div key={i} className="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs font-semibold text-orange-600">{MEAL_TIMES.find(m=>m.key===meal.mealTime)?.label||meal.mealTime}</span>
                  <span className="text-xs text-gray-400">{meal.kcal} kcal · {meal.protein}g E</span>
                </div>
                <p className="text-sm font-semibold text-gray-900 mb-1">{meal.name}</p>
                {meal.ingredients&&<div className="flex flex-wrap gap-1 mb-2">{meal.ingredients.map((ing,j)=><span key={j} className="text-[11px] bg-gray-100 text-gray-600 rounded px-1.5 py-0.5">{ing}</span>)}</div>}
                {meal.tip&&<p className="text-xs text-gray-500 italic">💡 {meal.tip}</p>}
              </div>
            ))}
            {dag.totals&&(
              <div className="bg-orange-50 border border-orange-100 rounded-xl p-3">
                <p className="text-xs font-semibold text-gray-600 mb-1">Dagtotaal</p>
                <p className="text-xs text-gray-600">{Math.round(dag.totals.kcal)} kcal · {Math.round(dag.totals.protein)}g eiwit · {Math.round(dag.totals.fat)}g vet · {Math.round(dag.totals.carbs)}g KH</p>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }
  return null;
}

// ─── Training placeholder ────────────────────────────────────────────────────
function TrainingPlaceholder(){
  return(
    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
      <Icon name="Dumbbell" size={36} className="mx-auto text-gray-300 mb-3"/>
      <h2 className="text-sm font-semibold text-gray-900 mb-1">Training tab</h2>
      <p className="text-xs text-gray-500">Binnenkort beschikbaar.</p>
    </div>
  );
}

// ─── Hoofd App ───────────────────────────────────────────────────────────────



function App() {
  const [userName, setUserName] = useState(null);
  const [tab, setTab] = useState('voeding');
  const [profile, setProfile] = useState(null);
  const [macros, setMacros] = useState(null);
  const [editingProfile, setEditingProfile] = useState(false);
  const [log, setLog] = useState([]);
  const [dateStr, setDateStr] = useState(toDateStr(new Date()));
  const [activeMeal, setActiveMeal] = useState(MEAL_TIMES[0].key);
  const [showSettings, setShowSettings] = useState(false);
  const [customFoods, setCustomFoods] = useState([]);

  const userSlug = userName ? slugifyName(userName) : '';

  // Profiel laden
  useEffect(() => {
    if (!userSlug) return;
    const p = lsGet(`profile:${userSlug}`);
    if (p) { setProfile(p); setMacros(calcMacros(p)); }
    const cf = lsGet(`custom-foods:${userSlug}`) || [];
    setCustomFoods(cf);
  }, [userSlug]);

  // Logboek laden
  useEffect(() => {
    if (!userSlug) return;
    const saved = lsGet(`daily-log:${userSlug}:${dateStr}`) || [];
    setLog(saved);
  }, [userSlug, dateStr]);

  const searchPool = useMemo(() => [...customFoods, ...NEVO_DATA], [customFoods]);

  function handleProfileComplete(p) {
    setProfile(p);
    const m = calcMacros(p);
    setMacros(m);
    lsSet(`profile:${userSlug}`, p);
    lsSet(`macros:${userSlug}`, m);
    setEditingProfile(false);
  }

  function handleAdjustKcal(newKcal) {
    if (!macros) return;
    const m = applyKcalToMacros(macros, newKcal);
    setMacros(m);
    lsSet(`macros:${userSlug}`, m);
  }

  function handleResetMacros() {
    if (!profile) return;
    const m = calcMacros(profile);
    setMacros(m);
    lsSet(`macros:${userSlug}`, m);
  }

  function addLogEntries(entries, mealOverride) {
    const meal = mealOverride || activeMeal;
    const newLog = [...log, ...entries.map(e => ({ ...e, mealTime: meal }))];
    setLog(newLog);
    lsSet(`daily-log:${userSlug}:${dateStr}`, newLog);
  }

  function removeLogEntry(id) {
    const newLog = log.filter(e => e.id !== id);
    setLog(newLog);
    lsSet(`daily-log:${userSlug}:${dateStr}`, newLog);
  }

  function addCustomFood(food) {
    const updated = [...customFoods.filter(f => f.id !== food.id), food];
    setCustomFoods(updated);
    lsSet(`custom-foods:${userSlug}`, updated);
  }

  function loadWeekDayToLog(dag, dagDateStr) {
    const entries = (dag.meals || []).flatMap(meal =>
      [{ id: `log-${Date.now()}-${Math.random().toString(36).slice(2)}`,
         name: meal.name, grams: null,
         kcal: meal.kcal||0, protein: meal.protein||0, fat: meal.fat||0, carbs: meal.carbs||0,
         source: 'weekschema', mealTime: meal.mealTime }]
    );
    const existing = lsGet(`daily-log:${userSlug}:${dagDateStr}`) || [];
    const merged = [...existing, ...entries];
    lsSet(`daily-log:${userSlug}:${dagDateStr}`, merged);
    setDateStr(dagDateStr);
    const saved = lsGet(`daily-log:${userSlug}:${dagDateStr}`) || [];
    setLog(saved);
  }

  const totals = useMemo(() => log.reduce((a,e) => ({
    kcal:a.kcal+e.kcal, protein:a.protein+e.protein, fat:a.fat+e.fat, carbs:a.carbs+e.carbs
  }), { kcal:0, protein:0, fat:0, carbs:0 }), [log]);

  const remaining = macros ? {
    kcal: Math.max(macros.targetKcal - totals.kcal, 0),
    protein: Math.max(macros.proteinG - totals.protein, 0),
    fat: Math.max(macros.fatG - totals.fat, 0),
    carbs: Math.max(macros.carbsG - totals.carbs, 0),
  } : null;

  if (!userName) return <AccessGate onUnlock={setUserName} />;

  return (
    <div className="min-h-screen bg-gray-50">
      {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}

      {/* Header */}
      <header className="sticky top-0 z-40 bg-blue-900 border-b border-blue-800 shadow-sm">
        <div className="flex items-center justify-between px-4 h-14 max-w-2xl mx-auto">
          <span className="text-lg font-bold text-white">Q<span className="text-orange-400">volve</span></span>
          <div className="flex items-center gap-3">
            <button onClick={() => setShowSettings(true)} className="text-blue-300 hover:text-white p-1.5 rounded-lg hover:bg-blue-800 transition-colors" title="Gemini API-sleutel instellen">
              <Icon name="Settings" size={18}/>
            </button>
            <button onClick={() => setUserName(null)} className="text-[11px] text-blue-300 hover:text-white underline">{userName}</button>
          </div>
        </div>
      </header>

      {/* Content */}
      <main className="max-w-2xl mx-auto px-4 pt-4 pb-24">

        {tab === 'voeding' && (
          <>
            {(!profile || editingProfile) && (
              <SetupWizard initial={profile} onComplete={handleProfileComplete} />
            )}
            {profile && !editingProfile && macros && (
              <div className="space-y-4">
                <DateNav dateStr={dateStr} onChange={setDateStr} />

                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                  <div className="flex items-center justify-between mb-3">
                    <h2 className="text-sm font-semibold text-gray-900">Dagtotaal</h2>
                    <button onClick={() => setEditingProfile(true)} className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1 py-1.5 px-2 rounded-lg hover:bg-gray-50">
                      <Icon name="Settings" size={13}/> Profiel
                    </button>
                  </div>
                  <div className="flex items-center justify-between mb-3 bg-gray-50 rounded-xl px-3 py-2">
                    <span className="text-xs text-gray-500">Caloriedoel</span>
                    <KcalAdjuster targetKcal={macros.targetKcal} onAdjust={handleAdjustKcal} onReset={handleResetMacros}/>
                  </div>
                  <div className="space-y-2.5">
                    <MacroBar label="Calorieën" consumed={totals.kcal} target={macros.targetKcal} unit="kcal" color="bg-orange-500"/>
                    <MacroBar label="Eiwit" consumed={totals.protein} target={macros.proteinG} unit="g" color="bg-blue-500"/>
                    <MacroBar label="Vet" consumed={totals.fat} target={macros.fatG} unit="g" color="bg-amber-500"/>
                    <MacroBar label="Koolhydraten" consumed={totals.carbs} target={macros.carbsG} unit="g" color="bg-purple-500"/>
                  </div>
                  <p className="text-[10px] text-gray-400 pt-2">BMR {macros.bmr} · TDEE {macros.tdee} kcal · {(MACRO_PROFILES[profile.macroProfile]||MACRO_PROFILES.normal).label}</p>
                </div>

                <div>
                  <p className="text-xs text-gray-400 mb-1.5">Voeg toe aan:</p>
                  <MealTimeSelector active={activeMeal} onChange={setActiveMeal}/>
                </div>

                <AddFoodPanel pool={searchPool} onAdd={addLogEntries} onSaveCustom={addCustomFood}/>

                {remaining && remaining.kcal > 50 && (
                  <MealSuggestionPanel remaining={remaining} onAdd={addLogEntries}/>
                )}

                <DailyLogList log={log} onRemove={removeLogEntry}/>

                <p className="text-[10px] text-gray-400 text-center pt-1">NEVO-online {NEVO_VERSION}, RIVM Bilthoven</p>
              </div>
            )}
          </>
        )}

        {tab === 'weekschema' && (
          profile && macros ? (
            <WeekSchemaPanel macros={macros} userSlug={userSlug} onLoadDayToLog={loadWeekDayToLog} onGoToVoeding={() => setTab('voeding')}/>
          ) : (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">
              <Icon name="Calendar" size={28} className="mx-auto text-gray-300 mb-3"/>
              <h2 className="text-sm font-semibold text-gray-900 mb-1">Stel eerst je profiel in</h2>
              <p className="text-xs text-gray-500 mb-4">Je macro's zijn nodig voor een persoonlijk weekschema.</p>
              <button onClick={() => setTab('voeding')} className="text-sm text-white bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-xl">Naar voeding →</button>
            </div>
          )
        )}

        {tab === 'training' && <TrainingPlaceholder/>}

      </main>

      {/* Bottom nav */}
      <nav className="fixed bottom-0 left-0 right-0 z-40 bg-blue-900 border-t border-blue-800 shadow-lg">
        <div className="max-w-2xl mx-auto flex">
          {[{id:'voeding',label:'Voeding',icon:'UtensilsCrossed'},{id:'weekschema',label:'Weekplan',icon:'Calendar'},{id:'training',label:'Training',icon:'Dumbbell'}].map(({id,label,icon})=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-3 transition-colors ${tab===id?'text-orange-400':'text-blue-300 active:text-blue-100'}`}>
              <Icon name={icon} size={22}/>
              <span className={`text-[10px] font-medium ${tab===id?'text-orange-400':'text-blue-300'}`}>{label}</span>
              {tab===id&&<span className="w-4 h-0.5 bg-orange-400 rounded-full"/>}
            </button>
          ))}
        </div>
        <div style={{height:'env(safe-area-inset-bottom,0px)'}} className="bg-blue-900"/>
      </nav>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(err) {
  document.getElementById('root').innerHTML = '<div style="padding:20px;background:#1e1e2e;color:#f38ba8;font-family:monospace;min-height:100vh"><h2 style="color:white">Render fout</h2><pre>' + err.message + '</pre></div>';
  console.error(err);
}

</script>
</body>
